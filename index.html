<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELITE STARS SHOP</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background-color: #000000; color: #ffffff; font-family: -apple-system, sans-serif; padding: 15px; margin: 0; }
        .header { text-align: center; padding: 20px 0; color: #ffd700; font-size: 22px; font-weight: bold; letter-spacing: 1px; }
        
        .category-btn {
            background: #111; border: 1px solid #ffd70033; color: #ffd700; width: 100%;
            padding: 18px; border-radius: 12px; font-size: 16px; font-weight: bold;
            margin-bottom: 12px; cursor: pointer; display: flex; justify-content: space-between; align-items: center;
        }
        
        .category-content { display: none; background: #080808; border-radius: 0 0 12px 12px; margin-top: -12px; margin-bottom: 15px; padding: 5px; border: 1px solid #ffd70033; border-top: none; }
        
        .offer-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #1a1a1a; }
        .price-tag { color: #ffd700; font-weight: bold; font-size: 14px; }
        
        .btn-group { display: flex; gap: 8px; }
        .method-btn { background: #ffd700; color: #000; border: none; padding: 8px 15px; border-radius: 8px; font-weight: bold; font-size: 12px; }
        .flexy-btn { background: #ffffff; }

        .payment-box { display: none; text-align: center; padding: 20px; border: 1px dashed #ffd700; border-radius: 15px; margin-top: 20px; background: #0a0a0a; }
        .upload-btn { background: #ffd700; color: #000; width: 100%; padding: 15px; border-radius: 10px; font-weight: bold; margin-top: 10px; border: none; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="header">ELITE STARS SHOP</div>

    <button class="category-btn" onclick="toggleMenu('stars')">⭐ Telegram Stars <span>▼</span></button>
    <div id="stars" class="category-content">
        <div class="offer-item">
            <span>50 نجمة</span>
            <div class="btn-group">
                <span class="price-tag">250 DA</span>
                <button class="method-btn" onclick="pay('50 Stars', 'CCP')">CCP</button>
                <button class="method-btn flexy-btn" onclick="pay('50 Stars', 'Flexy')">Flexy</button>
            </div>
        </div>
        </div>

    <button class="category-btn" onclick="toggleMenu('premium')">💎 Telegram Premium <span>▼</span></button>
    <div id="premium" class="category-content">
        <div class="offer-item">
            <span>3 أشهر</span>
            <div class="btn-group">
                <span class="price-tag">2800 DA</span>
                <button class="method-btn" onclick="pay('Premium 3M', 'CCP')">CCP</button>
                <button class="method-btn flexy-btn" onclick="pay('Premium 3M', 'Flexy')">Flexy</button>
            </div>
        </div>
    </div>

    <div id="pay-box" class="payment-box">
        <p id="pay-text" style="color: #ffd700; font-size: 14px;"></p>
        <div id="ccp-ui" class="hidden">
            <input type="file" id="fileIn" accept="image/*" class="hidden" onchange="sendImg(event)">
            <button class="upload-btn" onclick="document.getElementById('fileIn').click()">📸 إرسال صورة الوصل</button>
        </div>
        <div id="flexy-ui" class="hidden">
            <button class="upload-btn" style="background:#fff" onclick="sendFlexy()">✅ تأكيد طلب الفليكسي</button>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp; tg.expand();
        let curItem = ""; 
        const PHONE = "06XXXXXXXX"; // حط رقمك هنا

        function toggleMenu(id) {
            let m = document.getElementById(id);
            m.style.display = (m.style.display === 'block') ? 'none' : 'block';
        }

        function pay(item, method) {
            curItem = item;
            document.getElementById('pay-box').style.display = 'block';
            if(method === 'CCP') {
                document.getElementById('pay-text').innerText = "ارفع صورة وصل بريدي موب لطلب " + item;
                document.getElementById('ccp-ui').classList.remove('hidden');
                document.getElementById('flexy-ui').classList.add('hidden');
            } else {
                document.getElementById('pay-text').innerText = "فليكسي لـ " + PHONE + " ثم اضغط تأكيد لطلب " + item;
                document.getElementById('flexy-ui').classList.remove('hidden');
                document.getElementById('ccp-ui').classList.add('hidden');
            }
        }

        function sendImg(e) {
            const f = e.target.files[0];
            const r = new FileReader();
            r.onloadend = function() {
                tg.sendData(JSON.stringify({p: curItem, m: "CCP", img: r.result.split(',')[1]}));
                tg.close();
            }
            r.readAsDataURL(f);
        }

        function sendFlexy() {
            tg.sendData(JSON.stringify({p: curItem, m: "Flexy"}));
            tg.close();
        }
    </script>
</body>
</html>
