<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELITE STARS SHOP</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background-color: #0d0d0d; color: #ffffff; font-family: -apple-system, sans-serif; padding: 15px; text-align: right; margin: 0; }
        .header { text-align: center; padding: 20px 0; color: #ffd700; font-size: 24px; font-weight: bold; border-bottom: 1px solid #333; margin-bottom: 20px; }
        
        .category-btn {
            background: #1a1a1a; border: 1px solid #333; color: #ffd700; width: 100%;
            padding: 18px; border-radius: 12px; font-size: 18px; font-weight: bold;
            margin-bottom: 10px; cursor: pointer; display: flex; justify-content: space-between; align-items: center;
        }
        .category-content { display: none; background: #151515; border-radius: 0 0 12px 12px; margin-top: -12px; margin-bottom: 15px; padding: 10px; border: 1px solid #333; border-top: none; }
        
        .offer-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #222; }
        .price-tag { color: #ffd700; font-weight: bold; font-size: 14px; margin-left: 10px; }
        
        .method-btn { background: #ffd700; color: #000; border: none; padding: 8px 12px; border-radius: 8px; font-weight: bold; font-size: 12px; cursor: pointer; margin-right: 5px; }
        .flexy-btn { background: #ffffff; color: #000; }

        .payment-box { display: none; text-align: center; padding: 25px; border: 2px dashed #ffd700; border-radius: 20px; margin-top: 20px; background: #1a1a1a; box-shadow: 0 0 15px rgba(255, 215, 0, 0.1); }
        .hidden { display: none; }
        .info-text { color: #aaa; font-size: 14px; margin: 15px 0; line-height: 1.6; }
        .guarantee-btn { background: #222; color: #ffd700; border: 1px solid #ffd700; width: 100%; padding: 15px; border-radius: 12px; margin-top: 30px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">🌟 ELITE STARS SHOP</div>

    <button class="category-btn" onclick="toggleMenu('stars-menu')">⭐ Telegram Stars (النجوم) <span>▼</span></button>
    <div id="stars-menu" class="category-content">
        <div class="offer-item">
            <span>50 نجمة</span>
            <div>
                <span class="price-tag">250 DA</span>
                <button class="method-btn" onclick="selectMethod('50 Stars', 'CCP')">CCP</button>
                <button class="method-btn flexy-btn" onclick="selectMethod('50 Stars', 'Flexy')">Flexy</button>
            </div>
        </div>
        <div class="offer-item">
            <span>100 نجمة</span>
            <div>
                <span class="price-tag">450 DA</span>
                <button class="method-btn" onclick="selectMethod('100 Stars', 'CCP')">CCP</button>
                <button class="method-btn flexy-btn" onclick="selectMethod('100 Stars', 'Flexy')">Flexy</button>
            </div>
        </div>
        <div class="offer-item">
            <span>250 نجمة</span>
            <div>
                <span class="price-tag">1100 DA</span>
                <button class="method-btn" onclick="selectMethod('250 Stars', 'CCP')">CCP</button>
                <button class="method-btn flexy-btn" onclick="selectMethod('250 Stars', 'Flexy')">Flexy</button>
            </div>
        </div>
    </div>

    <button class="category-btn" onclick="toggleMenu('premium-menu')">💎 Telegram Premium <span>▼</span></button>
    <div id="premium-menu" class="category-content">
        <div class="offer-item">
            <span>3 أشهر (رسمي)</span>
            <div> 
              
                <span class="price-tag">2800 DA</span>
                <button class="method-btn" onclick="selectMethod('Premium 3M', 'CCP')">CCP</button>
                <button class="method-btn flexy-btn" onclick="selectMethod('Premium 3M', 'Flexy')">Flexy</button>
            </div>
        </div>
        <div class="offer-item">
            <span>6 أشهر (رسمي)</span>
            <div>
                <span class="price-tag">5200 DA</span>
                <button class="method-btn" onclick="selectMethod('Premium 6M', 'CCP')">CCP</button>
                <button class="method-btn flexy-btn" onclick="selectMethod('Premium 6M', 'Flexy')">Flexy</button>
            </div>
        </div>
    </div>

    <div id="payment-box" class="payment-box">
        <h3 id="payment-title" style="color: #ffd700; margin: 0;"></h3>
        <p id="payment-desc" class="info-text"></p>
        
        <div id="ccp-section" class="hidden">
            <input type="file" id="fileInput" accept="image/*" class="hidden" onchange="sendOrderImage(event)">
            <button class="method-btn" style="width:100%; padding:15px; font-size: 16px;" onclick="document.getElementById('fileInput').click()">📸 إرسال صورة الوصل</button>
        </div>

        <div id="flexy-section" class="hidden">
            <button class="method-btn flexy-btn" style="width:100%; padding:15px; font-size: 16px;" onclick="sendFlexyOrder()">✅ أرسل طلب الشحن بالفليكسي</button>
        </div>
    </div>

    <button class="guarantee-btn" onclick="showGuarantee()">🛡️ الضمانات والدعم الفني</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        let currentItem = "";
        let currentMethod = "";
        const MY_PHONE = "0549894647"; // <-- بدّل هاد الرقم برقمك يا معاذ

        function toggleMenu(id) {
            let menu = document.getElementById(id);
            const allMenus = document.querySelectorAll('.category-content');
            allMenus.forEach(m => { if(m.id !== id) m.style.display = 'none'; });
            menu.style.display = (menu.style.display === 'block') ? 'none' : 'block';
        }

        function selectMethod(item, method) {
            currentItem = item;
            currentMethod = method;
            document.getElementById('payment-box').style.display = 'block';
            document.getElementById('payment-title').innerText = "طلب " + item;
            
            if(method === 'CCP') {
                document.getElementById('payment-desc').innerText = "يرجى الدفع عبر بريدي موب أو CCP ثم رفع صورة الوصل هنا:";
                document.getElementById('ccp-section').classList.remove('hidden');
                document.getElementById('flexy-section').classList.add('hidden');
            } else {
                document.getElementById('payment-desc').innerText = "يرجى الفليكسي إلى الرقم: " + MY_PHONE + " ثم اضغط على الزر لإرسال الطلب للأدمين.";
                document.getElementById('flexy-section').classList.remove('hidden');
                document.getElementById('ccp-section').classList.add('hidden');
            }
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        function sendOrderImage(event) {
            const file = event.target.files[0];
            const reader = new FileReader();
            reader.onloadend = function() {
                const base64Data = reader.result.replace(/^.+,/, '');
                tg.sendData(JSON.stringify({product: currentItem, method: "CCP/BaridiMob", image: base64Data}));
                tg.close();
            }
            reader.readAsDataURL(file);
        }

        function sendFlexyOrder() {
            tg.sendData(JSON.stringify({product: currentItem, method: "Flexy"}));
            tg.close();
        }

        function showGuarantee() {
            tg.showAlert("✅ ضمان ELITE STARS:\n1. شحن رسمي وقانوني 100%.\n2. تسليم سريع (من 5 إلى 30 دقيقة).\n3. دعم فني متواصل عبر @wuldc.");
        }
    </script>
</body>
</html>
