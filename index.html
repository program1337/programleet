<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ELITE STARS SHOP</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --gold: #f1c40f; --bg: #000; --card: #111; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; padding: 15px; margin: 0; }
        .header { text-align: center; padding: 20px; color: var(--gold); font-size: 24px; font-weight: bold; }
        
        /* ستايل القوائم المنسدلة */
        .category { background: var(--card); border: 1px solid #222; border-radius: 12px; margin-bottom: 15px; overflow: hidden; }
        .cat-head { padding: 18px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; font-weight: bold; color: var(--gold); }
        .cat-body { display: none; padding: 0 10px 10px 10px; background: #080808; border-top: 1px solid #222; }
        
        .item { display: flex; justify-content: space-between; align-items: center; padding: 15px 5px; border-bottom: 1px solid #1a1a1a; }
        .item:last-child { border-bottom: none; }
        
        .price { color: var(--gold); font-weight: bold; margin-left: 10px; }
        .buy-btns { display: flex; gap: 5px; }
        .btn { border: none; padding: 8px 12px; border-radius: 6px; font-size: 11px; font-weight: bold; cursor: pointer; }
        .btn-ccp { background: #222; color: #fff; }
        .btn-flexy { background: var(--gold); color: #000; }

        /* واجهة الدفع (تخرج من التحت) */
        .pay-sheet { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: #111; border-top: 3px solid var(--gold); padding: 25px; border-radius: 20px 20px 0 0; text-align: center; z-index: 100; }
        .up-box { border: 2px dashed #444; padding: 20px; border-radius: 12px; color: var(--gold); margin: 15px 0; }
    </style>
</head>
<body>
    <div class="header">ELITE STARS SHOP ⚜️</div>

    <div class="category">
        <div class="cat-head" onclick="toggle(this)">⭐ شحن النجوم (Stars) <span>▼</span></div>
        <div class="cat-body" id="stars-body"></div>
    </div>

    <div class="category">
        <div class="cat-head" onclick="toggle(this)">💎 تليجرام بريميوم <span>▼</span></div>
        <div class="cat-body" id="prem-body"></div>
    </div>

    <div id="pay-sheet" class="pay-sheet">
        <h3 id="item-name"></h3>
        <p id="instr" style="font-size: 13px; color: #888;"></p>
        <div id="ccp-area" style="display:none">
            <input type="file" id="file" style="display:none" onchange="sendImg(event)">
            <div class="up-box" onclick="document.getElementById('file').click()">📸 ارفع صورة الوصل</div>
        </div>
        <button id="flexy-btn" class="btn btn-flexy" style="display:none; width:100%; padding:15px;" onclick="sendFlexy()">✅ تأكيد الفليكسي</button>
        <button onclick="closePay()" style="background:none; border:none; color:red; margin-top:15px;">إلغاء</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp; tg.expand();
        let cur = ""; const NUM = "0549894647";

        const stars = [{n:"50", p:"250"}, {n:"100", p:"450"}, {n:"200", p:"850"}, {n:"250", p:"1100"}, {n:"500", p:"2100"}, {n:"1000", p:"4100"}];
        const prems = [{n:"3 أشهر", p:"2800"}, {n:"6 أشهر", p:"5200"}, {n:"12 شهر (عام)", p:"9800"}];

        function toggle(el) {
            let body = el.nextElementSibling;
            body.style.display = (body.style.display === 'block') ? 'none' : 'block';
        }

        function fill(list, id, type) {
            const container = document.getElementById(id);
            list.forEach(i => {
                container.innerHTML += `<div class="item"><span>${i.n}</span><div class="buy-btns"><span class="price">${i.p} DA</span><button class="btn btn-ccp" onclick="openP('${i.n}','CCP')">CCP</button><button class="btn btn-flexy" onclick="openP('${i.n}','Flexy')">Flexy</button></div></div>`;
            });
        }
        fill(stars, 'stars-body'); fill(prems, 'prem-body');

        function openP(it, m) {
            cur = it; document.getElementById('pay-sheet').style.display='block';
            document.getElementById('item-name').innerText = it;
            if(m==='CCP'){ 
                document.getElementById('instr').innerText="ارفع الوصل هنا";
                document.getElementById('ccp-area').style.display='block'; document.getElementById('flexy-btn').style.display='none';
            } else {
                document.getElementById('instr').innerText="فليكسي لـ " + NUM;
                document.getElementById('flexy-btn').style.display='block'; document.getElementById('ccp-area').style.display='none';
            }
        }
        function closePay() { document.getElementById('pay-sheet').style.display='none'; }

        function sendImg(e) {
            const r = new FileReader(); r.onloadend = () => {
                tg.sendData(JSON.stringify({p:cur, m:"CCP", img:r.result.split(',')[1]}));
                tg.close();
            }; r.readAsDataURL(e.target.files[0]);
        }
        function sendFlexy() { tg.sendData(JSON.stringify({p:cur, m:"Flexy"})); tg.close(); }
    </script>
</body>
</html>
